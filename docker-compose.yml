services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: memory-assistant-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: memory_assistant
      POSTGRES_USER: memory_user
      POSTGRES_PASSWORD: memory_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/001_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U memory_user -d memory_assistant"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
